# Continuous integration: lint + the offline test suite on every push / PR.
#
# This mirrors steps 1–3 of build.sh (install, lint, test) but stays lean and
# hermetic — it runs the deterministic offline path (mock LLM + lexical backend,
# in-memory Mongo), so no API key, network model download, or Docker is needed.
# The `slow` embedding tests skip themselves automatically (the embeddings extra
# is not installed here) and the `live` tests skip without RUN_LIVE_LLM, so the
# pipeline is fast and reproducible. The full Docker build + E2E run lives in
# build.sh, which is the packaging/release path rather than per-commit CI.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower bound (project floor) and a current release, so we notice if a
        # change quietly relies on something newer than requires-python = 3.10.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev extra only — no ML stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests e2e eval

      - name: Test (offline; slow/live auto-skip)
        # No env needed: tests/conftest.py sets the offline test environment
        # (USE_MOCK_LLM, SIMILARITY_BACKEND=lexical, and the AUTH_SECRET it mints
        # tokens with) via os.environ.setdefault before the app is imported.
        # Setting a *different* AUTH_SECRET here would break token verification.
        run: pytest -q
