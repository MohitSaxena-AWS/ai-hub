# Configuration-driven behaviour.
#
# The application reads this prompt at startup and the assistant behaves
# according to it. Changing this file changes which fields are collected and,
# therefore, the shape of the data persisted to the database. Historical
# records remain intact because each stored request carries its own
# `schema_version` / `prompt_fingerprint`.

# Identifies the data structure produced by this prompt. Bump this whenever you
# change `fields` so older records stay queryable under their own version.
schema_version: 1

# The assistant's system instructions. This is the "Sample Prompt" from the
# assignment, lightly formatted.
system_prompt: |
  You are an AI Assistant working at the internal engineering service desk of a
  bank. Engineering teams come to you to submit a new engineering request (e.g.,
  provisioning infrastructure or onboarding a new service into the platform).

  To process the request, the platform-engineering department requires the
  following information:
    1. The request type, which is one of: "infrastructure-provisioning",
       "service-deployment", "access-grant", "pipeline-change", "incident-fix".
    2. The target environment, which is one of: "development", "staging",
       "production".
    3. The business justification / priority of the request.

  Ask the requester for their name and employee ID at the end.

  Guide the conversation one topic at a time, be concise and professional, and
  confirm values that must match a fixed set of options. When every required
  field has been collected, summarise the request back to the requester.

# Structured definition of the fields the assistant must collect. The
# conversation engine uses this both to steer the LLM and to know when the
# request is complete. `business_fields` are the non-PII fields used for
# privacy-preserving duplicate detection.
fields:
  - name: request_type
    description: The type of the engineering request.
    # `question` is what the assistant asks when it prompts for this field
    # directly (the opening message and the offline mock). Optional — omit it and
    # the engine generates a question from the name/enum/description.
    question: >-
      What type of request would you like to submit — infrastructure-provisioning,
      service-deployment, access-grant, pipeline-change, or incident-fix?
    enum:
      - infrastructure-provisioning
      - service-deployment
      - access-grant
      - pipeline-change
      - incident-fix
    business: true
  - name: environment
    description: The target environment for the request.
    question: "Which environment is this for: development, staging, or production?"
    enum:
      - development
      - staging
      - production
    business: true
  - name: business_justification
    description: The business justification and/or priority of the request.
    question: What is the business justification and priority for this request?
    business: true
  - name: requester_name
    description: Full name of the requester.
    question: Lastly, could you tell me your full name?
    pii: true
  - name: employee_id
    description: Employee ID of the requester.
    question: And your employee ID?
    pii: true

# Domain-specific conversational text. Kept here (not in code) so that swapping
# this file for a different domain changes the whole user-facing experience, not
# just the fields collected. The engine appends a question
# for the first field to `opening_message`. The duplicate messages must never
# reveal anything about the other request or requester.
opening_message: >-
  Hello! I'm the engineering service desk assistant. I'll help you submit a new
  engineering request.

duplicate_prompt_message: >-
  It looks like a similar request already exists. Would you like to update the
  existing request instead of creating a new one? (yes/no)

duplicate_clarify_message: >-
  Please answer 'yes' to update the existing request, or 'no' to create a new
  one.

duplicate_updated_message: Your existing request has been updated.

# Message sent to the requester once the request has been stored successfully.
completion_message: >
  Thank you. Your engineering request has been recorded successfully and this
  session is now closed.
